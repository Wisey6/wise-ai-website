name = "wise-ai-inquiry-agent"
main = "src/index.js"
compatibility_date = "2026-01-01"

# Replace <KV_ID> after running:
#   wrangler kv namespace create USAGE
[[kv_namespaces]]
binding = "USAGE"
id = "<KV_ID>"

# Secrets (set with `wrangler secret put <NAME>`, stored encrypted — never in git):
#   ANTHROPIC_API_KEY   — for the /  inquiry-chat endpoint
#   RESEND_API_KEY      — for the /lead audit-form endpoint (emails leads to Tyler)
#   FROM_EMAIL          — (optional) verified sender, e.g. "Wise Ai <hello@wiseai.website>"
#   OWNER_EMAIL         — (optional) override lead recipient (defaults to tyler@wiseai.website)
# See README.md → "Audit form email setup".
