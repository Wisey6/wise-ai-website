<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Wise Ai — AI Audit &amp; Agent Officer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800;900&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles/site.css?v=17" />
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://unpkg.com/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

  <script type="text/babel" src="components/OwlMark.jsx"></script>
  <script type="text/babel" src="components/Wordmark.jsx"></script>
  <script type="text/babel" src="components/Nav.jsx"></script>
  <script type="text/babel" src="components/Hero.jsx"></script>
  <script type="text/babel" src="components/Services.jsx"></script>
  <script type="text/babel" src="components/Process.jsx"></script>
  <script type="text/babel" src="components/Closing.jsx"></script>
  <script type="text/babel" src="components/Tweaks.jsx"></script>

  <script type="text/babel" data-presets="env,react">
    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "accent": "#FF4D00",
      "heroVariant": "snow",
      "italic": "stroke"
    }/*EDITMODE-END*/;

    function App() {
      const [state, setState] = React.useState(TWEAK_DEFAULTS);

      // apply accent to CSS var
      React.useEffect(() => {
        document.documentElement.style.setProperty("--accent", state.accent);
      }, [state.accent]);

      const go = (id) => {
        if (id === "top") { window.scrollTo({ top: 0, behavior: "smooth" }); return; }
        const el = document.getElementById(id);
        if (el) window.scrollBy({ top: el.getBoundingClientRect().top - 20, behavior: "smooth" });
      };

      return (
        <>
          <Nav onNav={go} />
          <Hero variant={state.heroVariant} />
          <Marquee />
          <Services />
          <Process />
          <Proof />
          <Manifesto />
          <Contact />
          <Footer />
          <Tweaks state={state} setState={setState} />
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
