<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MacBook Pro 14-inch M5</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    #canvas-container {
      width: 100%;
      height: 100vh;
      position: relative;
    }

    #canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    .info {
      position: absolute;
      bottom: 60px;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
      color: white;
      z-index: 10;
      pointer-events: none;
    }

    .info h1 {
      font-size: 3rem;
      margin-bottom: 12px;
      font-weight: 700;
      letter-spacing: -0.02em;
      text-shadow: 0 2px 10px rgba(0,0,0,0.5);
    }

    .info p {
      font-size: 1.2rem;
      opacity: 0.85;
      font-weight: 400;
      text-shadow: 0 1px 5px rgba(0,0,0,0.5);
    }

    .status {
      position: absolute;
      top: 20px;
      left: 20px;
      color: #999;
      font-size: 13px;
      font-family: 'Monaco', monospace;
      z-index: 10;
    }

    .hint {
      position: absolute;
      bottom: 20px;
      right: 20px;
      color: #666;
      font-size: 12px;
      font-family: 'Monaco', monospace;
      z-index: 10;
    }
  </style>
</head>
<body>
  <div id="canvas-container">
    <canvas id="canvas"></canvas>
  </div>

  <div class="status">
    <div id="model-status">Loading MacBook Pro...</div>
  </div>

  <div class="info">
    <h1>MacBook Pro</h1>
    <p>14-inch M5</p>
  </div>

  <div class="hint">
    Drag to rotate • Scroll to zoom
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/GLTFLoader.min.js"></script>

  <script>
    const canvas = document.getElementById('canvas');
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(
      50,
      window.innerWidth / window.innerHeight,
      0.1,
      1000
    );
    const renderer = new THREE.WebGLRenderer({
      canvas,
      antialias: true,
      alpha: false,
      powerPreference: 'high-performance'
    });

    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.setClearColor(0x1a1a1a);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFShadowShadowMap;
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.0;

    camera.position.set(0, 0.8, 2.5);
    camera.lookAt(0, 0.2, 0);

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
    scene.add(ambientLight);

    const keyLight = new THREE.DirectionalLight(0xffffff, 1.2);
    keyLight.position.set(4, 6, 3);
    keyLight.castShadow = true;
    keyLight.shadow.mapSize.width = 4096;
    keyLight.shadow.mapSize.height = 4096;
    keyLight.shadow.camera.left = -10;
    keyLight.shadow.camera.right = 10;
    keyLight.shadow.camera.top = 10;
    keyLight.shadow.camera.bottom = -10;
    keyLight.shadow.bias = -0.0005;
    scene.add(keyLight);

    const fillLight = new THREE.DirectionalLight(0x87ceeb, 0.4);
    fillLight.position.set(-5, 3, -3);
    scene.add(fillLight);

    const rimLight = new THREE.DirectionalLight(0xffffff, 0.3);
    rimLight.position.set(0, 4, -6);
    scene.add(rimLight);

    const backLight = new THREE.PointLight(0x4a90e2, 0.5);
    backLight.position.set(-8, 2, -8);
    scene.add(backLight);

    let model = null;
    const loader = new THREE.GLTFLoader();
    const statusDiv = document.getElementById('model-status');

    loader.load('scene.gltf', (gltf) => {
      model = gltf.scene;
      model.position.set(0, 0, 0);
      model.scale.set(1, 1, 1);
      model.rotation.set(0, 0, 0);

      model.traverse((child) => {
        if (child.isMesh) {
          child.castShadow = true;
          child.receiveShadow = true;
          if (child.material) {
            child.material.side = THREE.FrontSide;
          }
        }
      });

      scene.add(model);
      statusDiv.textContent = 'Loaded ✓';
      statusDiv.style.color = '#4a9d6f';
    }, (progress) => {
      const percent = Math.round((progress.loaded / progress.total) * 100);
      statusDiv.textContent = `Loading... ${percent}%`;
    }, (error) => {
      console.error('Error loading model:', error);
      statusDiv.textContent = 'Error loading model';
      statusDiv.style.color = '#e24a4a';
    });

    let mouseDown = false;
    let mouseX = 0;
    let mouseY = 0;
    let targetRotationX = 0;
    let targetRotationY = 0;

    document.addEventListener('mousedown', (e) => {
      mouseDown = true;
      mouseX = e.clientX;
      mouseY = e.clientY;
    });

    document.addEventListener('mousemove', (e) => {
      if (mouseDown && model) {
        const deltaMove = {
          x: e.clientX - mouseX,
          y: e.clientY - mouseY
        };

        targetRotationY += deltaMove.x * 0.005;
        targetRotationX += deltaMove.y * 0.005;

        mouseX = e.clientX;
        mouseY = e.clientY;
      }
    });

    document.addEventListener('mouseup', () => {
      mouseDown = false;
    });

    let zoom = 2.5;
    document.addEventListener('wheel', (e) => {
      e.preventDefault();
      zoom += e.deltaY * 0.001;
      zoom = Math.max(1, Math.min(5, zoom));
      camera.position.z = zoom;
    }, { passive: false });

    function animate() {
      requestAnimationFrame(animate);

      if (model) {
        model.rotation.y += (targetRotationY - model.rotation.y) * 0.1;
        model.rotation.x += (targetRotationX - model.rotation.x) * 0.1;

        if (!mouseDown) {
          model.rotation.y += 0.0008;
        }
      }

      renderer.render(scene, camera);
    }

    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
