<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Wise Ai · AI audit, ranking, and build for SMBs</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800;900&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
/* ================================================================
   WISE Ai — site styles (simplified)
   ================================================================ */

:root {
  --snow: #FAFAFA;
  --snow-2: #F2EEE8;
  --coil: #1A1A1A;
  --coil-2: #333333;
  --fire: #FF4D00;
  --sand: #C5A474;
  --ocean: #256AFF;

  --bg: var(--snow);
  --ink: var(--coil);
  --accent: var(--fire);

  --font-display: "Archivo", "Helvetica Neue", Helvetica, Arial, sans-serif;
  --font-mono: "JetBrains Mono", ui-monospace, monospace;

  --edge: 40px;
  --maxw: 1360px;

  /* motion */
  --ease-out: cubic-bezier(0.23, 1, 0.32, 1);
  --ease-in-out: cubic-bezier(0.77, 0, 0.175, 1);
  --ease-drawer: cubic-bezier(0.32, 0.72, 0, 1);
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; scroll-behavior: smooth; }
body {
  background: var(--bg);
  color: var(--ink);
  font-family: var(--font-display);
  font-weight: 400;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
  overflow-x: hidden;
}
::selection { background: var(--fire); color: #fff; }
a { color: inherit; text-decoration: none; }
button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
img { max-width: 100%; display: block; }

/* ---- shared ---- */
.section-kicker {
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  opacity: 0.6;
}
.section-kicker--light { color: var(--snow); opacity: 0.7; }

.section-title {
  font-family: var(--font-display);
  font-weight: 800;
  font-size: clamp(48px, 6vw, 88px);
  line-height: 0.95;
  letter-spacing: -0.035em;
  margin: 14px 0 0;
}
.section-lede {
  font-size: clamp(18px, 1.4vw, 22px);
  line-height: 1.45;
  max-width: 620px;
  margin: 20px 0 0;
  opacity: 0.75;
}

.btn {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  padding: 16px 24px;
  font-family: var(--font-display);
  font-weight: 600;
  font-size: 15px;
  border-radius: 999px;
  transition: background-color 200ms ease, color 200ms ease, border-color 200ms ease, transform 160ms var(--ease-out), box-shadow 200ms ease;
  border: 1.5px solid transparent;
  line-height: 1;
  will-change: transform;
}
.btn:active { transform: scale(0.97); }
.btn--lg { padding: 20px 32px; font-size: 16px; }
.btn--primary { background: var(--coil); color: var(--snow); }
.btn--ghost { background: transparent; border-color: currentColor; }
.btn--outline { background: transparent; border: 1.5px solid var(--ink); color: var(--ink); }
@media (hover: hover) and (pointer: fine) {
  .btn--primary:hover { background: var(--fire); }
  .btn--ghost:hover { background: var(--ink); color: var(--snow); border-color: var(--ink); }
  .btn--outline:hover { background: var(--ink); color: var(--snow); transform: translateY(-1px); box-shadow: 0 8px 20px rgba(0,0,0,0.12); }
}

/* ============== NAV (app-icon bubble) ============== */
.nav-bubble {
  position: fixed;
  top: 20px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 100;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
  opacity: 0;
  transition: opacity 700ms ease;
  pointer-events: none;
}
.nav-bubble.is-visible { opacity: 1; pointer-events: auto; }
.nav-bubble__icon {
  position: relative;
  width: 72px;
  height: 72px;
  border-radius: 22px;
  background: rgba(255, 255, 255, 0.72);
  -webkit-backdrop-filter: blur(14px) saturate(140%);
  backdrop-filter: blur(14px) saturate(140%);
  box-shadow:
    0 1px 2px rgba(0,0,0,0.06),
    0 6px 14px rgba(0,0,0,0.10),
    0 16px 32px rgba(0,0,0,0.14),
    inset 0 1px 0 rgba(255,255,255,0.9),
    inset 0 -1px 0 rgba(0,0,0,0.04),
    inset 0 0 0 1px rgba(0,0,0,0.06);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: transform 200ms var(--ease-out), box-shadow 200ms ease;
  padding: 10px;
  border: none;
  isolation: isolate;
  will-change: transform;
}
.nav-bubble__icon:active { transform: scale(0.95); }
.nav-bubble__icon::before,
.nav-bubble__icon::after { content: none; }
@media (hover: hover) and (pointer: fine) {
  .nav-bubble__icon:hover,
  .nav-bubble.is-open .nav-bubble__icon {
    transform: translateY(-2px) scale(1.03);
    box-shadow: 0 14px 40px rgba(242, 120, 47, 0.35), 0 10px 30px rgba(0,0,0,0.18);
  }
  .nav-bubble__icon:active { transform: scale(0.95); }
}
.nav-bubble__icon img {
  position: relative;
  width: 100%;
  height: auto;
  display: block;
  object-fit: contain;
  z-index: 1;
}
.nav-bubble__menu {
  display: flex;
  align-items: center;
  gap: 4px;
  background: var(--snow);
  border-radius: 999px;
  padding: 8px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.15);
  opacity: 0;
  transform: translateY(-6px) scale(0.97);
  transform-origin: top center;
  pointer-events: none;
  transition: opacity 180ms var(--ease-out), transform 200ms var(--ease-out);
}
.nav-bubble.is-open .nav-bubble__menu {
  opacity: 1;
  transform: translateY(0) scale(1);
  pointer-events: auto;
}
.nav-bubble__menu a {
  padding: 12px 20px;
  font-family: var(--font-display);
  font-weight: 800;
  font-size: 19px;
  color: var(--coil);
  border-radius: 999px;
  transition: background-color 160ms ease, color 160ms ease, transform 140ms var(--ease-out);
  letter-spacing: -0.01em;
}
.nav-bubble__menu a:active { transform: scale(0.97); }
@media (hover: hover) and (pointer: fine) {
  .nav-bubble__menu a:hover { background: rgba(0,0,0,0.06); }
}
.nav-bubble__cta {
  background: var(--fire);
  color: var(--snow) !important;
}
@media (hover: hover) and (pointer: fine) {
  .nav-bubble__cta:hover { background: var(--coil) !important; }
}
@media (max-width: 820px) {
  .nav-bubble__menu { flex-direction: column; align-items: stretch; border-radius: 22px; padding: 10px; }
  .nav-bubble__menu a { text-align: center; font-size: 18px; }
}

/* hide legacy nav styles */
.nav { display: none; }

/* ============== HERO ============== */
.hero {
  position: relative;
  min-height: 100vh;
  padding: 110px var(--edge) 40px;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}
.hero--orange { background: var(--fire); color: var(--coil); }
.hero--snow { background: var(--snow); color: var(--coil); }
.hero--coil { background: var(--coil); color: var(--snow); }

.hero__stage--split {
  position: relative;
  max-width: var(--maxw);
  margin: 0 auto;
  width: 100%;
  flex: 1;
  display: grid;
  grid-template-columns: 1.1fr 0.9fr;
  gap: 40px;
  align-items: start;
  padding: 40px 0;
  min-height: 70vh;
}
.hero__left {
  display: flex;
  flex-direction: column;
  gap: 28px;
  align-items: flex-start;
  text-align: left;
  /* raise left column slightly so WISE cap-line aligns with laptop bezel top */
  padding-top: clamp(8px, 2vh, 32px);
}

.hero__right {
  position: relative;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100%;
  min-height: 420px;
  gap: 8px;
}

.hero__laptop-caption {
  position: relative;
  z-index: 3;
  font-family: var(--font-display);
  font-weight: 800;
  font-size: clamp(22px, 2.1vw, 30px);
  letter-spacing: -0.02em;
  color: var(--coil);
  text-align: center;
  margin-top: -8px;
  max-width: 420px;
  line-height: 1.15;
}

/* ---- Cinematic intro reveal ---- */
.hero-intro-white {
  position: fixed;
  inset: 0;
  z-index: 20;
  background: #ffffff;
  display: flex;
  align-items: center;
  justify-content: center;
  pointer-events: none;
}
.hero-intro-wordmark {
  position: absolute;
  left: 50%;
  top: calc(50% + min(28vmin, 240px));
  transform: translateX(-50%);
  font-family: var(--font-display, var(--font-sans));
  font-weight: 800;
  font-size: clamp(22px, 4vmin, 52px);
  letter-spacing: -0.02em;
  white-space: nowrap;
  transition: opacity 120ms linear;
}
@media (max-width: 640px) {
  .hero-intro-wordmark {
    top: calc(50% + min(24vh, 180px));
    font-size: clamp(20px, 5vw, 34px);
  }
}
.hero-intro-owl-flight {
  /* drop shadow softens so it reads against both white and the darker laptop bezel */
  filter: drop-shadow(0 10px 30px rgba(0, 0, 0, 0.06));
}
.hero__right--responsive {
  height: 560px;
  min-height: 560px;
}
@media (max-width: 820px) {
  .hero__right--responsive {
    height: 380px;
    min-height: 380px;
  }
}

@keyframes heroFadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}

.hero__3d {
  position: relative;
  width: 100%;
  height: 100%;
  min-height: 520px;
  z-index: 2;
  pointer-events: none;
}
.hero__3d-mount { position: absolute; inset: 0; }
.hero__3d-mount canvas { display: block; width: 100% !important; height: 100% !important; }
.hero__3d-status {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--coil);
  opacity: 0.6;
  background: rgba(255,255,255,0.3);
  padding: 8px 14px;
  border-radius: 999px;
  backdrop-filter: blur(6px);
}

.hero__wordmark {
  position: relative;
  z-index: 2;
  display: inline-flex;
  align-items: flex-end;
  gap: 0.04em;
  line-height: 0.85;
}
.hero__wise {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: clamp(92px, 14.5vw, 220px);
  letter-spacing: -0.05em;
  color: var(--coil);
}
.hero__ai {
  font-family: var(--font-display);
  font-size: clamp(22px, 3vw, 44px);
  font-weight: 500;
  letter-spacing: -0.02em;
  color: var(--coil);
  margin-bottom: 0;
  line-height: 1;
}

/* Ready-to-implement CTA block, just below hero content */
.hero__cta-block {
  position: relative;
  z-index: 3;
  max-width: var(--maxw);
  margin: 60px auto 20px;
  padding: 36px 44px;
  background: var(--coil);
  color: var(--snow);
  border-radius: 20px;
  display: flex;
  flex-direction: column;
  gap: 14px;
  box-shadow: 0 20px 50px rgba(0,0,0,0.18);
}
.hero__cta-title {
  font-family: var(--font-display);
  font-weight: 800;
  font-size: clamp(28px, 3.2vw, 44px);
  line-height: 1.05;
  letter-spacing: -0.03em;
  margin: 0;
  max-width: 720px;
}
.hero__cta-sub {
  font-family: var(--font-display);
  font-size: clamp(15px, 1.2vw, 18px);
  line-height: 1.5;
  margin: 0;
  opacity: 0.78;
  max-width: 640px;
}
.hero__cta-actions {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
  margin-top: 10px;
}
.hero__cta-block .btn--primary { background: var(--fire); color: var(--coil); }
.hero__cta-block .btn--primary:hover { background: var(--snow); color: var(--coil); }
.hero__cta-block .btn--ghost { color: var(--snow); border-color: rgba(255,255,255,0.5); }
.hero__cta-block .btn--ghost:hover { background: var(--snow); color: var(--coil); border-color: var(--snow); }
@media (max-width: 900px) {
  .hero__cta-block { padding: 26px 22px; margin: 30px 0 0; }
}

.hero__tag {
  position: relative;
  z-index: 2;
  font-family: var(--font-display);
  font-weight: 400;
  font-size: clamp(19px, 1.6vw, 24px);
  line-height: 1.35;
  max-width: 480px;
  margin: 0;
  color: var(--coil);
  opacity: 0.85;
}

.hero__actions {
  position: relative;
  z-index: 3;
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
}

@media (max-width: 900px) {
  .hero__stage--split {
    grid-template-columns: 1fr;
    gap: 20px;
  }
  .hero__right { min-height: 320px; }
  .hero__3d { height: 340px; }
  /* AI sub-letters need to scale down so they align with WISE on smaller viewports */
  .hero__ai { height: auto !important; font-size: clamp(20px, 4.5vw, 36px) !important; line-height: 1 !important; }
  .hero__wordmark { align-items: flex-end; line-height: 0.95; }
}

.hero__topbar {
  position: relative;
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  opacity: 0.9;
  padding-bottom: 20px;
  border-bottom: 1px solid currentColor;
  margin-bottom: 20px;
  z-index: 3;
}
.hero__kicker { display: inline-flex; align-items: center; gap: 10px; }
.dot, .blink-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: currentColor;
  animation: blink 1.8s ease-in-out infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

.hero--orange .btn--primary { background: var(--coil); color: var(--snow); }
.hero--orange .btn--primary:hover { background: var(--snow); color: var(--coil); }
.hero--orange .btn--ghost { color: var(--coil); border-color: var(--coil); }
.hero--orange .btn--ghost:hover { background: var(--coil); color: var(--snow); }

@media (max-width: 820px) {
  .hero { padding: 100px 20px 30px; --edge: 20px; }
  .hero__3d { width: 100%; height: 40vh; top: 50%; }
}

/* ============== MARQUEE ============== */
.marquee {
  background: var(--coil);
  color: var(--snow);
  padding: 22px 0;
  overflow: hidden;
  font-family: var(--font-display);
  font-weight: 700;
  font-size: clamp(32px, 5vw, 64px);
  letter-spacing: -0.02em;
  line-height: 1;
}
.marquee__track { display: flex; white-space: nowrap; animation: tick 30s linear infinite; }
.marquee__group { display: inline-flex; align-items: center; gap: 28px; padding-right: 28px; }
.marquee__group i { font-style: normal; color: var(--fire); font-size: 0.45em; }
@keyframes tick { from { transform: translateX(0); } to { transform: translateX(-50%); } }

/* ============== SERVICES ============== */
.services { padding: 120px var(--edge); max-width: var(--maxw); margin: 0 auto; }
.services__header { max-width: 820px; margin-bottom: 50px; }
.services__switch {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 0;
  border-radius: 14px;
  overflow: hidden;
  background: var(--snow-2);
  padding: 4px;
  width: fit-content;
  margin-bottom: 32px;
}
.services__tab {
  padding: 14px 24px;
  text-align: left;
  display: flex;
  align-items: center;
  gap: 10px;
  background: transparent;
  transition: background-color 200ms ease, color 200ms ease, transform 160ms var(--ease-out);
  border-radius: 10px;
  font-size: 15px;
  font-weight: 600;
  will-change: transform;
}
.services__tab:active { transform: scale(0.97); }
@media (hover: hover) and (pointer: fine) {
  .services__tab:not(.is-active):hover { background: rgba(26,26,26,0.06); }
}
.services__tab-num {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  opacity: 0.5;
}
.services__tab-name { font-weight: 600; }
.services__tab.is-active { background: var(--coil); color: var(--snow); }
.services__tab.is-active .services__tab-num { opacity: 0.8; }

.services__panel {
  display: grid;
  grid-template-columns: 1.2fr 1fr;
  gap: 60px;
  padding: 48px;
  background: var(--snow-2);
  border-radius: 20px;
}
.services__panel-label {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--fire);
  margin-bottom: 16px;
}
.services__panel-kicker {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: clamp(28px, 3vw, 40px);
  letter-spacing: -0.02em;
  line-height: 1.1;
  margin: 0 0 20px;
}
.services__panel-body {
  font-size: 17px;
  line-height: 1.5;
  margin: 0 0 28px;
  opacity: 0.8;
}
.services__panel-list {
  list-style: none;
  padding: 0;
  margin: 0 0 32px;
  display: flex;
  flex-direction: column;
  gap: 0;
}
.services__panel-list li {
  display: flex; gap: 12px;
  padding: 14px 0;
  border-bottom: 1px solid rgba(0,0,0,0.08);
  font-size: 15px;
  align-items: flex-start;
}
.services__panel-list li:last-child { border-bottom: none; }
.services__panel-bullet { color: var(--fire); font-weight: 700; flex-shrink: 0; }

.services__kpi-stack {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 12px;
  margin-bottom: 24px;
}
.services__kpi {
  padding: 20px 16px;
  display: flex;
  flex-direction: column;
  gap: 6px;
  background: var(--snow);
  border-radius: 12px;
}
.services__kpi-big {
  font-family: var(--font-display);
  font-weight: 800;
  font-size: clamp(32px, 3vw, 44px);
  letter-spacing: -0.03em;
  line-height: 1;
  color: var(--fire);
}
.services__kpi-small {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  opacity: 0.65;
}
.services__panel--wide {
  display: flex !important;
  flex-direction: column;
  gap: 18px;
  padding: 32px 32px 48px;
}
.services__panel-head {
  display: flex;
  flex-direction: column;
  gap: 10px;
  max-width: 820px;
}
.services__panel-foot {
  display: flex;
  justify-content: center;
  margin-top: 8px;
}
.services__playground {
  position: relative;
  width: 100%;
  background: var(--snow);
  border-radius: 18px;
  padding: 40px 20px 40px;
  overflow: visible;
  min-height: 620px;
}

/* ---- interactive card stack ---- */
.cardstack {
  position: relative;
  width: 100%;
  min-height: 560px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: default;
}
.cardstack__deck {
  position: relative;
  width: 100%;
  height: 560px;
}
.cardstack__card {
  position: absolute;
  left: 50%;
  top: 50%;
  width: 220px;
  height: 300px;
  margin-left: -110px;
  margin-top: -150px;
  border-radius: 18px;
  overflow: hidden;
  background: var(--tint);
  color: var(--ink, #1A1A1A);
  box-shadow: 0 18px 44px rgba(0,0,0,0.16), 0 4px 12px rgba(0,0,0,0.08);
  border: 1px solid rgba(0,0,0,0.08);
  z-index: var(--z);
  display: flex;
  flex-direction: column;
  cursor: pointer;
  will-change: transform;
  transition: width 500ms var(--ease-out), height 500ms var(--ease-out), margin 500ms var(--ease-out), box-shadow 400ms ease, transform 500ms var(--ease-out);
  transform: translate(var(--x), var(--y)) rotate(var(--rot));
}
.cardstack__card:active { filter: brightness(0.97); }
.cardstack__card--resting {
  opacity: 0;
  transform: translate(var(--x), var(--y)) rotate(var(--rot)) scale(0.92);
  transition: opacity 550ms cubic-bezier(0.23, 1, 0.32, 1), transform 650ms cubic-bezier(0.23, 1, 0.32, 1), box-shadow 300ms ease;
}
.cardstack__deck.is-revealed .cardstack__card--resting {
  opacity: 1;
  transform: translate(var(--x), var(--y)) rotate(var(--rot)) scale(1);
}
.cardstack__deck.is-revealed.is-floating .cardstack__card--resting {
  animation: cardstackFloat var(--float-dur, 5s) ease-in-out var(--float-delay, 0s) infinite;
}
@keyframes cardstackFloat {
  0%   { transform: translate(var(--x), calc(var(--y) - 0px))  rotate(var(--rot))                     scale(1); }
  25%  { transform: translate(var(--x), calc(var(--y) - 6px))  rotate(calc(var(--rot) - 0.4deg))       scale(1); }
  50%  { transform: translate(var(--x), calc(var(--y) - 10px)) rotate(calc(var(--rot) + 0.2deg))       scale(1.008); }
  75%  { transform: translate(var(--x), calc(var(--y) - 4px))  rotate(calc(var(--rot) + 0.5deg))       scale(1); }
  100% { transform: translate(var(--x), calc(var(--y) - 0px))  rotate(var(--rot))                     scale(1); }
}
@media (hover: hover) and (pointer: fine) {
  .cardstack__deck.is-revealed .cardstack__card--resting:hover {
    transform: translate(var(--x), var(--y)) rotate(var(--rot)) scale(1.05);
    box-shadow: 0 26px 54px rgba(0,0,0,0.22), 0 6px 14px rgba(0,0,0,0.12);
    /* no z-index change — hovered card grows in place, natural neighbors keep overlapping */

    box-shadow: 0 18px 36px rgba(0,0,0,0.22);
  }
}
.cardstack__card--active,
.cardstack__card--collapsed {

}
.cardstack__card--active {
  width: 340px;
  height: 420px;
  margin-left: -170px;
  margin-top: -210px;
  box-shadow: 0 34px 72px rgba(0,0,0,0.28), 0 10px 24px rgba(0,0,0,0.14);
}
.cardstack__card--collapsed {
  width: 108px;
  height: 148px;
  margin-left: -54px;
  margin-top: -74px;
}
.cardstack__texture {
  flex: 1 1 auto;
  position: relative;
  overflow: hidden;
  border-top: 1px solid rgba(0,0,0,0.08);
}
.cardstack__label {
  flex: 0 0 auto;
  padding: 16px 18px 14px;
  display: flex;
  flex-direction: column;
  gap: 4px;
  justify-content: flex-start;
}
.cardstack__rank {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 1.5px;
  opacity: 0.7;
  text-transform: uppercase;
}
.cardstack__title {

  font-style: italic;
  font-size: 26px;
  line-height: 1.02;
  letter-spacing: -0.01em;
}
.cardstack__desc {
  font-family: var(--font-display);
  font-size: 13px;
  line-height: 1.45;
  margin: 6px 0 0;
  opacity: 0;
  max-height: 0;
  transform: translateY(6px);
  transition: opacity 0.35s ease 0.2s, transform 0.4s ease 0.2s, max-height 0.5s ease;
}
.cardstack__card--active .cardstack__desc {
  opacity: 0.88;
  max-height: 220px;
  transform: translateY(0);
}
.cardstack__card--active .cardstack__title { font-size: 34px; }
.cardstack__card--collapsed .cardstack__title { font-size: 15px; }
.cardstack__card--collapsed .cardstack__label { padding: 8px 10px 10px; }
.cardstack__card--collapsed .cardstack__rank { font-size: 8px; }
.cardstack__card--dark { --ink: #FAFAFA; }
.cardstack__card--dark .cardstack__texture { border-top-color: rgba(255,255,255,0.14); }
/* textures */
.cardstack__tx--bars {
  background-image: repeating-linear-gradient(90deg, rgba(0,0,0,0.22) 0 3px, transparent 3px 12px);
}
.cardstack__tx--grid {

    linear-gradient(rgba(0,0,0,0.14) 1px, transparent 1px),

}
.cardstack__tx--waves {

}
.cardstack__tx--dots {
  background-image: radial-gradient(rgba(255,255,255,0.42) 1.6px, transparent 2px);
  background-size: 11px 11px;
}
.cardstack__tx--wire {
  background-image:
    linear-gradient(rgba(255,77,0,0.55) 1px, transparent 1px),

}

/* ---- Phase 2 · Opportunities ranked bar chart ---- */
.oppchart {
  width: 100%;

  padding: 24px 12px;
}
.oppchart__head {
  display: flex;

}
.oppchart__kicker {
  font-family: var(--font-mono);
  font-size: 11px;

}
.oppchart__meta {

.oppchart__rank {

  font-size: 11px;
  letter-spacing: 0.15em;

}
.oppchart__row.is-top .oppchart__rank { color: var(--fire); opacity: 1; }
.oppchart__body { display: flex; flex-direction: column; gap: 6px; min-width: 0; }
.oppchart__title-row {

}
.oppchart__title {

.oppchart__desc {

}

/* ---- Phase 3 · Build system diagram ---- */
.bsystem {
  position: relative;
  width: 100%;
  max-width: 820px;
  aspect-ratio: 1 / 0.68;
  margin: 0 auto;
}
.bsystem__lines {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  overflow: visible;
}
.bsystem__line {
  stroke-dashoffset: 40;
  transition: stroke-dashoffset 900ms cubic-bezier(0.23, 1, 0.32, 1), opacity 500ms cubic-bezier(0.23, 1, 0.32, 1);
  opacity: 0;
}
.bsystem.is-revealed .bsystem__line { stroke-dashoffset: 0; opacity: 1; }
.bsystem__center {
  position: absolute;
  left: 50%;
  top: 50%;
  transform: translate(-50%, -50%) scale(0.92);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  background: var(--coil);
  color: var(--snow);
  padding: 18px 24px;
  border-radius: 999px;
  min-width: 170px;
  text-align: center;
  box-shadow: 0 12px 30px rgba(0,0,0,0.22);

  transition: opacity 500ms cubic-bezier(0.23, 1, 0.32, 1) 100ms, transform 600ms cubic-bezier(0.23, 1, 0.32, 1) 100ms;
}
.bsystem.is-revealed .bsystem__center { opacity: 1; transform: translate(-50%, -50%) scale(1); }
.bsystem__center-kicker {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  opacity: 0.65;
}
.bsystem__center-title {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 18px;
  letter-spacing: -0.015em;
}
.bsystem__center-sub {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.1em;
  opacity: 0.6;
}
.bsystem__node {
  position: absolute;
  transform: translate(-50%, -50%) scale(0.94);
  opacity: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
  background: #FFFFFF;
  border: 1px solid rgba(26,26,26,0.12);

  border-radius: 12px;

}
.bsystem.is-revealed .bsystem__node { opacity: 1; transform: translate(-50%, -50%) scale(1); }
@media (hover: hover) and (pointer: fine) {
  .bsystem__node:hover { border-color: var(--fire); }
}
.bsystem__node-title {
  font-family: var(--font-display);
  font-weight: 700;

}
.bsystem__node-sub {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.08em;
  opacity: 0.6;
}

// WISE Ai wordmark — WISE bold, Ai at a quarter of the size, aligned to top.

}

window.Wordmark = Wordmark;

// Uses the real Wise Ai owl logo (cropped, background knocked out)
function OwlMark({ size = 64, variant = "coil", className = "" }) {

    variant === "white" ? "assets/owl-white.png" :

}

window.OwlMark = OwlMark;

function Nav({ onNav }) {
  const [open, setOpen] = React.useState(false);

    try { return sessionStorage.getItem("wiseai_intro_done") === "1"; } catch (e) { return false; }
  });

  React.useEffect(() => {
    if (visible) return;
    const onReady = () => setVisible(true);
    window.addEventListener("wiseai:intro-done", onReady);
    return () => window.removeEventListener("wiseai:intro-done", onReady);
  }, [visible]);

  const items = [
    ["work", "Work"],
    ["services", "Services"],
    ["process", "Process"],
  ];
  const showMenu = hover || open;
  return (
    <nav
      className={`nav-bubble ${showMenu ? "is-open" : ""} ${visible ? "is-visible" : ""}`}
      onMouseLeave={() => setHover(false)}
      aria-hidden={!visible}

      <button
        className="nav-bubble__icon"
        aria-label="Menu"
        onMouseEnter={() => setHover(true)}
        onClick={(e) => {

          setOpen(!open);

}

window.Nav = Nav;

// Loads the real MacBook GLTF model from the Wise Ai GitHub repo.
// Files (scene.gltf, scene.bin, textures/) must sit alongside the HTML when deployed.
const MODEL_BASE_URLS = [
  "", // same directory as the deployed HTML (prod)
  "https://cdn.jsdelivr.net/gh/Wisey6/wise-ai-website@main/", // fallback for preview
];

function HeroLaptop3D({ showOwlOnScreen = false, lidClose = 0, onScreenRect = null, idleEnabled = true, spinProgress = 0 }) {
  const mountRef = React.useRef(null);
  const rafRef = React.useRef(0);
  const cameraRef = React.useRef(null);
  const onScreenRectRef = React.useRef(onScreenRect);
  React.useEffect(() => { onScreenRectRef.current = onScreenRect; }, [onScreenRect]);
  const idleEnabledRef = React.useRef(idleEnabled);
  React.useEffect(() => { idleEnabledRef.current = idleEnabled; }, [idleEnabled]);
  const spinProgressRef = React.useRef(spinProgress);
  React.useEffect(() => { spinProgressRef.current = spinProgress; }, [spinProgress]);
  const showOwlRef = React.useRef(showOwlOnScreen);
  React.useEffect(() => { showOwlRef.current = showOwlOnScreen; }, [showOwlOnScreen]);
  const lidCloseRef = React.useRef(lidClose);
  React.useEffect(() => { lidCloseRef.current = lidClose; }, [lidClose]);
  const [status, setStatus] = React.useState("Loading MacBook…");

  React.useEffect(() => {
    if (!window.THREE) return;
    const THREE = window.THREE;
    const mount = mountRef.current;
    if (!mount) return;

    const width = mount.clientWidth;
    const height = mount.clientHeight;

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(30, width / height, 0.1, 100);
    cameraRef.current = camera;
    // Camera sits at its resting composition for the entire page life.
    // The intro reveal is handled entirely in the DOM (white panel + owl PNG)
    // so the 3D model never scales/distorts — it's always at its natural aspect.
    const restingPos = new THREE.Vector3(0, 0.8, 5.0);
    const restingLookAt = new THREE.Vector3(0, 0, 0);
    camera.position.copy(restingPos);
    camera.lookAt(restingLookAt);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(width, height);
    renderer.setClearColor(0x000000, 0);
    renderer.outputEncoding = THREE.sRGBEncoding;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.05;
    mount.appendChild(renderer.domElement);

    // lighting
    scene.add(new THREE.AmbientLight(0xffffff, 0.55));
    const key = new THREE.DirectionalLight(0xffffff, 1.2);
    key.position.set(4, 6, 3);
    scene.add(key);
    const fill = new THREE.DirectionalLight(0xffd9c2, 0.6);
    fill.position.set(-5, 3, -2);
    scene.add(fill);
    const rim = new THREE.DirectionalLight(0xffffff, 0.4);
    rim.position.set(0, 4, -6);
    scene.add(rim);

    let model = null;
    let disposed = false;

    const loader = new THREE.GLTFLoader();

    // owl screen overlay texture
    const texLoader = new THREE.TextureLoader();
    texLoader.crossOrigin = "anonymous";
    // Screen texture starts BLANK WHITE. paintOwlOnScreen() is called later
    // (when the flying PNG lands) to swap in the owl wallpaper — a clean texture
    // handoff instead of pixel-matched animation.
    const size = 1024;
    const aspect = 16 / 10;
    const texW = size, texH = Math.round(size / aspect);
    let screenCanvas = document.createElement("canvas");
    screenCanvas.width = texW;
    screenCanvas.height = texH;
    let screenCtx = screenCanvas.getContext("2d");
    screenCtx.fillStyle = "#ffffff";
    screenCtx.fillRect(0, 0, texW, texH);
    const owlTex = new THREE.CanvasTexture(screenCanvas);
    owlTex.encoding = THREE.sRGBEncoding;
    owlTex.flipY = false;
    owlTex.wrapS = THREE.ClampToEdgeWrapping;
    owlTex.wrapT = THREE.ClampToEdgeWrapping;
    let owlPaintedOnScreen = false;
    const paintOwlOnScreen = () => {
      if (owlPaintedOnScreen) return;
      const owlSrc = (window.__resources && window.__resources.owlTransparent) || "assets/owl-transparent.png";
      const img = new Image();
      img.crossOrigin = "anonymous";
      img.onload = () => {
        const targetH = texH * 0.6;
        const targetW = targetH * (img.width / img.height);
        const x = (texW - targetW) / 2;
        const y = (texH - targetH) / 2;
        screenCtx.fillStyle = "#ffffff";
        screenCtx.fillRect(0, 0, texW, texH);
        screenCtx.drawImage(img, x, y, targetW, targetH);
        owlTex.needsUpdate = true;
        owlPaintedOnScreen = true;
      };
      img.src = owlSrc;
    };

    let screenMesh = null;
    let lidGroup = null;
    let lidPivot = null;
    const applyOwlToScreen = (root) => {
      root.traverse((child) => {
        if (!child.isMesh) return;
        const matName = (child.material && child.material.name) || "";
        if (matName !== "HlQwFCAPWzetDQy") return;
        screenMesh = child;
        const m = child.material;
        if (m.emissiveMap && m.emissiveMap.dispose) m.emissiveMap.dispose();
        m.emissiveMap = owlTex;
        m.emissive = new THREE.Color(0xffffff);
        m.emissiveIntensity = 1.0;
        if (m.map && m.map.dispose) m.map.dispose();
        m.map = owlTex;
        m.color = new THREE.Color(0xffffff);
        m.needsUpdate = true;
      });
      // Find the lid subtree. In the Sketchfab MacBook model, the parent node
      // "nIhhmAXgzOpXafM_62" has exactly 2 children: base (EhCmdLAMoLoXcIA_43)
      // and lid (RcexTyyhpuJYATQ_61). The lid's local AABB gives us the hinge
      // location — bottom-front edge (y = min_y, z = max_z).
      // NOTE: lid-close animation disabled — the Sketchfab GLTF hierarchy has
      // meshes with baked-in transforms that don't respond to a hinge-pivot
      // rotation on their parent group. Leaving the laptop open for now.
      let lidParent = null;
      // eslint-disable-next-line no-constant-condition
      if (false && lidParent && lidParent.children.length >= 2) {
        // Pick the child whose AABB is TALLER (bigger Y extent) = the lid.
        let tallest = null, tallestH = 0;
        for (const c of lidParent.children) {
          const b = new THREE.Box3().setFromObject(c);
          const h = b.max.y - b.min.y;
          if (h > tallestH) { tallestH = h; tallest = c; }
        }
        if (tallest) {
          lidGroup = tallest;
          const lidBox = new THREE.Box3().setFromObject(lidGroup);
          // Hinge on a MacBook: the BACK-BOTTOM edge of the lid. That point
          // stays fixed as the lid rotates forward to close. Lid sits at
          // negative z (screen faces +z toward camera), so back = min.z.
          const hingeWorld = new THREE.Vector3(0, lidBox.min.y, lidBox.min.z);
          // Convert to lidParent local space
          lidParent.updateWorldMatrix(true, false);
          const hingeLocal = lidParent.worldToLocal(hingeWorld.clone());
          lidPivot = new THREE.Group();
          lidPivot.position.copy(hingeLocal);
          lidParent.add(lidPivot);
          lidPivot.updateWorldMatrix(true, false);
          // `attach` reparents while preserving world transform. This is the
          // correct API for arbitrary-pivot rotation.
          lidPivot.attach(lidGroup);
        }
      }
    };

    const tryLoad = (i) => {
      if (i >= MODEL_BASE_URLS.length || disposed) {
        setStatus("Using fallback display");
        // fallback: show a stylised placeholder block
        const g = new THREE.Group();
        const metal = new THREE.MeshStandardMaterial({ color: 0x1a1a1a, metalness: 0.85, roughness: 0.35 });
        const base = new THREE.Mesh(new THREE.BoxGeometry(2.4, 0.08, 1.6), metal);
        base.position.y = -0.04;
        const lid = new THREE.Mesh(new THREE.BoxGeometry(2.4, 1.5, 0.06), metal);
        lid.position.set(0, 0.75, -0.78);
        lid.rotation.x = -0.15;
        g.add(base, lid);
        model = g;
        scene.add(model);
        return;
      }
      const base = MODEL_BASE_URLS[i];
      const url = base + "scene.gltf";
      loader.setResourcePath(base);
      loader.load(
        url,
        (gltf) => {
          if (disposed) return;
          model = gltf.scene;
          // normalise scale + centre
          const box = new THREE.Box3().setFromObject(model);
          const size = box.getSize(new THREE.Vector3());
          const maxDim = Math.max(size.x, size.y, size.z);
          // Scale target — a touch smaller so it sits calmer in the layout.
          const target = 1.55;
          const scale = target / maxDim;
          model.scale.setScalar(scale);
          const center = box.getCenter(new THREE.Vector3()).multiplyScalar(scale);
          model.position.sub(center);
          // Drop the laptop a bit below centre — top of the lid lands
          // around the mid-line of the "E" in the WISE wordmark.
          model.position.y += -0.55;
          applyOwlToScreen(model);
          scene.add(model);
          setStatus("");
          // DEBUG: expose model for inspection
          window.__wiseModel = model;
          window.__wiseScreenMesh = screenMesh;
          window.__wiseTHREE = THREE;
        },
        undefined,
        (err) => {
          console.warn("gltf load failed from", base, err);
          tryLoad(i + 1);
        }
      );
    };
    tryLoad(0);

    let t0 = performance.now();
    let idleAmpCur = 0;
    const loop = () => {
      const t = (performance.now() - t0) / 1000;
      const close = Math.max(0, Math.min(1, lidCloseRef.current || 0));
      const idleTarget = idleEnabledRef.current ? 1 : 0;
      // smoothly ramp the idle amplitude in/out so sway doesn't snap on
      idleAmpCur += (idleTarget - idleAmpCur) * 0.04;
      const spin = Math.max(0, Math.min(1, spinProgressRef.current || 0));
      if (model) {
        const idleAmount = (1 - close) * idleAmpCur;
        // Subtle left-right sway + gentle vertical float for a polished idle.
        // Sway is offset in phase from the bob so movement feels organic.
        model.rotation.y = Math.sin(t * 0.55) * 0.06 * idleAmount;
        model.rotation.z = Math.sin(t * 0.75 + 1.2) * 0.012 * idleAmount;
        model.position.x = Math.sin(t * 0.65 + 0.8) * 0.035 * idleAmount;
        model.position.y = -0.55 + Math.sin(t * 1.05) * 0.09 * idleAmount;
      }
      // REAL lid close: rotate the lid pivot about its X axis. At close=0
      // the lid is at its default open angle (~110°). At close=1 the lid
      // is flat closed (parallel to keyboard). The lid sits at the back with
      // its normal pointing roughly -Z (toward camera), so a POSITIVE X rotation
      // folds it forward onto the keyboard.
      if (lidPivot) {
        // MacBook lid open angle ≈ 110° from keyboard plane. The model already
        // ships with lid open, so rotation 0 = open. Close by rotating forward
        // (+X) by ~110° → ~1.92 rad.
        lidPivot.rotation.x = close * 1.92;
      }
      if (showOwlRef.current) {
        paintOwlOnScreen();
      }
      // Project the screen mesh's world AABB into viewport-pixel coords so the
      // flying PNG owl can land exactly on top of the 3D on-screen owl.
      if (screenMesh && onScreenRectRef.current) {
        const box = new THREE.Box3().setFromObject(screenMesh);
        const corners = [
          new THREE.Vector3(box.min.x, box.min.y, box.min.z),
          new THREE.Vector3(box.max.x, box.min.y, box.min.z),
          new THREE.Vector3(box.min.x, box.max.y, box.min.z),
          new THREE.Vector3(box.max.x, box.max.y, box.min.z),
          new THREE.Vector3(box.min.x, box.min.y, box.max.z),
          new THREE.Vector3(box.max.x, box.min.y, box.max.z),
          new THREE.Vector3(box.min.x, box.max.y, box.max.z),
          new THREE.Vector3(box.max.x, box.max.y, box.max.z),
        ];
        const rect = mount.getBoundingClientRect();
        let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
        for (const c of corners) {
          const v = c.clone().project(camera);
          const px = rect.left + (v.x + 1) * 0.5 * rect.width;
          const py = rect.top + (1 - (v.y + 1) * 0.5) * rect.height;
          if (px < minX) minX = px;
          if (py < minY) minY = py;
          if (px > maxX) maxX = px;
          if (py > maxY) maxY = py;
        }
        onScreenRectRef.current({
          x: minX, y: minY,
          w: maxX - minX, h: maxY - minY,
          cx: (minX + maxX) / 2, cy: (minY + maxY) / 2,
        });
      }
      renderer.render(scene, camera);
      rafRef.current = requestAnimationFrame(loop);
    };
    loop();

    const onResize = () => {
      const w = mount.clientWidth;
      const h = mount.clientHeight;
      if (!w || !h) return;
      camera.aspect = w / h;
      camera.updateProjectionMatrix();
      renderer.setSize(w, h);
    };
    window.addEventListener("resize", onResize);

    return () => {
      disposed = true;
      cancelAnimationFrame(rafRef.current);
      window.removeEventListener("resize", onResize);
      renderer.dispose();
      if (renderer.domElement.parentNode) {
        renderer.domElement.parentNode.removeChild(renderer.domElement);
      }
    };
  }, []);

  return (
    <div className="hero__3d" aria-hidden>
      <div ref={mountRef} className="hero__3d-mount" />
      {status && <div className="hero__3d-status">{status}</div>}
    </div>
  );
}

function Hero({ variant = "orange" }) {
  // Cinematic auto-play reveal. No scroll lock.
  // phase progress: 0..1 over INTRO_MS; drives opacities and the owl flight.
  const INTRO_MS = 2400;
  const [phase, setPhase] = React.useState(() => {
    try { return sessionStorage.getItem("wiseai_intro_done") === "1" ? 1 : 0; } catch (e) { return 0; }
  });
  const phaseRef = React.useRef(phase);
  phaseRef.current = phase;

  // Live screen-mesh bounds — legacy; no longer required for pixel-accurate
  // handoff since we now texture-swap the 3D laptop screen instead. Kept as a
  // rough flight target.
  const [screenRect, setScreenRect] = React.useState(null);
  const [viewport, setViewport] = React.useState({
    w: typeof window !== "undefined" ? window.innerWidth : 1440,
    h: typeof window !== "undefined" ? window.innerHeight : 900,
  });

  const handleScreenBounds = React.useCallback((b) => {
    if (typeof window !== "undefined") window.__wiseScreenRect = b;
    setScreenRect(b);
  }, []);

  // Scroll choreography (revised):
  //   1. Owl-flight intro plays (laptop frozen — no sway, no bobbing).
  //   2. The moment the owl lands, laptop idle float begins and persists —
  //      no scroll-driven spin, no lid close. Just a stationary, gently
  //      floating laptop that normal page scroll passes by.
  const heroRef = React.useRef(null);
  const lidClose = 0;
  const spinProgress = 0;

  // Laptop idle-sway gate — kicks in at the instant the owl finishes its flight.
  // Owl flight runs over phase 0.30..0.65, so ≥ 0.65 is landed.
  const [idleEnabled, setIdleEnabled] = React.useState(false);
  React.useEffect(() => {
    if (phase >= 0.65 && !idleEnabled) setIdleEnabled(true);
  }, [phase, idleEnabled]);

  React.useEffect(() => {
    const measure = () => setViewport({ w: window.innerWidth, h: window.innerHeight });
    measure();
    window.addEventListener("resize", measure);
    return () => window.removeEventListener("resize", measure);
  }, []);

  // Laptop sits still once it lands — idle hover only, no scroll-driven spin.

  React.useEffect(() => {
    if (phase >= 1) return;
    let raf = 0;
    const t0 = performance.now();
    const tick = () => {
      const elapsed = performance.now() - t0;
      const p = Math.min(1, elapsed / INTRO_MS);
      setPhase(p);
      if (p < 1) {
        raf = requestAnimationFrame(tick);
      } else {
        try { sessionStorage.setItem("wiseai_intro_done", "1"); } catch (e) {}
        try { window.dispatchEvent(new Event("wiseai:intro-done")); } catch (e) {}
      }
    };
    raf = requestAnimationFrame(tick);
    return () => cancelAnimationFrame(raf);
  }, []);

  // easing helpers
  const easeOutCubic = (x) => 1 - Math.pow(1 - x, 3);
  const easeInOutCubic = (x) => x < 0.5 ? 4 * x * x * x : 1 - Math.pow(-2 * x + 2, 3) / 2;

  // phase breakdown:
  //   0.00 – 0.30  owl rises in, wordmark traces (white fullscreen)
  //   0.30 – 0.65  owl flies from viewport centre to laptop-screen position; laptop canvas fades in; white panel recedes
  //   0.65 – 1.00  copy + topbar + CTAs rise into place; PNG owl fades (3D on-screen owl takes over)
  const p = phase;
  const owlRevealT = easeOutCubic(Math.min(1, p / 0.30));           // 0..1 during first segment
  const owlFlightT = easeInOutCubic(Math.max(0, Math.min(1, (p - 0.30) / 0.35))); // 0..1 during middle
  const copyT      = easeOutCubic(Math.max(0, Math.min(1, (p - 0.65) / 0.35)));   // 0..1 during last
  const whiteFadeT = easeInOutCubic(Math.max(0, Math.min(1, (p - 0.30) / 0.30))); // white panel dissolves mid-animation
  const laptopFadeT= easeOutCubic(Math.max(0, Math.min(1, (p - 0.35) / 0.35)));    // laptop fades in during middle

  // PNG owl position/size interpolation
  // starting state: centred in viewport — sized so it fits with breathing room
  // on every aspect ratio (portrait phone, tablet, wide desktop).
  // Reserve ~20% viewport width margin AND room below for the wordmark.
  const isMobile = viewport.w < 640;
  const widthBound = viewport.w * (isMobile ? 0.68 : 0.55);
  const heightBound = viewport.h * (isMobile ? 0.42 : 0.52);
  const startSize = Math.min(widthBound, heightBound, 480);
  const startSizeClamped = Math.max(160, startSize);
  const startCx = viewport.w / 2;
  // On very short screens, lift the owl slightly so the wordmark fits beneath.
  const startCy = viewport.h / 2 - (isMobile ? viewport.h * 0.04 : 0);
  // end state: MATCH the 3D on-screen owl exactly. It's drawn at 60% of the
  // screen-mesh height, centred. The screen mesh projects to screenRect, so:
  //   endCy = screenRect.cy
  //   endSize = 0.60 * screenRect.height  (the PNG owl is a square-ish box; size = side length)
  // If bounds haven't arrived yet, fall back to a sensible approximation.
  // Flight target: center of the right-column laptop area. Roughly 75% across
  // the viewport, 45% down. Pixel-perfect landing no longer required since the
  // 3D laptop screen texture-swaps to the owl at p≈0.62.
  // end state: match the 3D on-screen owl exactly. The owl is drawn at 60%
  // of the screen-canvas height, centred within the 16:10 screen. The screen
  // mesh projects into viewport pixels via `screenRect`. If the rect hasn't
  // arrived yet, fall back to a reasonable approximation.
  // owl-transparent.png is 660 x 520 — wider than tall.
  const OWL_ASPECT = 660 / 520; // w/h ≈ 1.269
  // The 3D on-screen owl is painted at 60% of screen-texture height.
  // Matching THAT in projected pixels means the PNG's displayed width =
  //   (0.60 * screenRect.h) * OWL_ASPECT
  // so the PNG height (auto) = 0.60 * screenRect.h, lining up exactly.
  const ONSCREEN_H_RATIO = 0.60;
  let endSize, endCx, endCy;
  if (screenRect && screenRect.w > 0 && screenRect.h > 0) {
    endSize = screenRect.h * ONSCREEN_H_RATIO * OWL_ASPECT;
    endCx = screenRect.cx;
    endCy = screenRect.cy;
  } else {
    endSize = Math.min(viewport.w, viewport.h) * (isMobile ? 0.20 : 0.24);
    endCx = isMobile ? viewport.w * 0.50 : viewport.w * 0.72;
    endCy = isMobile ? viewport.h * 0.27 : viewport.h * 0.30;
  }

  const owlCx = startCx + (endCx - startCx) * owlFlightT;
  const owlCy = startCy + (endCy - startCy) * owlFlightT;
  const owlSize = startSizeClamped + (endSize - startSizeClamped) * owlFlightT;
  const owlPngHeight = owlSize / OWL_ASPECT;
  // reveal scale/opacity during first segment
  const owlRevealScale = 0.92 + owlRevealT * 0.08;
  const owlBaseOpacity = owlRevealT;
  // once flight reaches the laptop, cross-fade out — the 3D screen texture
  // has just been painted with the owl, so this is a seamless handoff.
  const owlHandoffOpacity = Math.max(0, 1 - Math.max(0, (p - 0.60) / 0.08));
  const pngOwlOpacity = Math.min(owlBaseOpacity, owlHandoffOpacity);

  const whiteOpacity = 1 - whiteFadeT;
  // show introductory wordmark only during the opening beat
  const introWordmarkOpacity = Math.max(0, owlRevealT - Math.max(0, (p - 0.22) / 0.15));

  // copy fade / rise
  const copyOpacity = copyT;
  const copyShiftY = (1 - copyT) * 18;

  const [time, setTime] = React.useState(
    new Date().toLocaleTimeString("en-AU", { hour12: false, timeZone: "Australia/Brisbane" })
  );
  React.useEffect(() => {
    const t = setInterval(() => setTime(new Date().toLocaleTimeString("en-AU", { hour12: false, timeZone: "Australia/Brisbane" })), 1000);
    return () => clearInterval(t);
  }, []);

  // rightColRef kept as a ref for potential layout math but we no longer
  // pin the laptop — it scrolls naturally with the hero.
  const rightColRef = React.useRef(null);

  const owlSrc = (typeof window !== "undefined" && window.__resources && window.__resources.owlTransparent) || "assets/owl-transparent.png";

  return (
    <section
      id="top"
      ref={heroRef}
      className={`hero hero--${variant} hero--v2`}
      data-screen-label="01 Hero"
      style={{
        // gentle fade only — the real drama is the 3D lid closing
        opacity: 1 - lidClose * 0.5,
      }}
    >
      <div
        className="hero__topbar"
        style={{ opacity: copyOpacity, transform: `translateY(${(1 - copyOpacity) * 8}px)` }}
      >
        <span className="hero__kicker">
          <span className="dot" /> Available · Accepting new clients
        </span>
        <span className="hero__clock">Brisbane · {time}</span>
      </div>

      <div className="hero__stage hero__stage--split">
        <div
          className="hero__left"
          style={{
            opacity: copyOpacity,
            transform: `translateY(${copyShiftY}px)`,
            pointerEvents: copyOpacity > 0.5 ? "auto" : "none",
          }}
        >
          <div className="hero__wordmark">
            <span className="hero__wise" style={{ color: "rgb(242, 120, 47)", fontWeight: 700 }}>WISE</span>
            <span className="hero__ai" style={{ color: "rgb(242, 120, 47)", height: "177px", fontSize: "35px", display: "inline-block" }}> AI</span>
          </div>
          <p className="hero__tag" style={{ fontWeight: 500, color: "rgb(0, 0, 0)", maxWidth: "500px" }}>
            We turn AI confusion into compounding advantage.
          </p>
          <div className="hero__actions">
            <a href="#services" className="btn btn--primary btn--lg">
              <span>See services</span>
              <Arrow />
            </a>
            <a href="https://calendly.com/tyler-wiseai/30min?background_color=000000&text_color=ffffff&primary_color=ec702f" target="_blank" rel="noopener noreferrer" className="btn btn--ghost btn--lg">
              Book a call
            </a>
          </div>
        </div>

        <div
          ref={rightColRef}
          className="hero__right hero__right--responsive"
          style={{ width: "100%", position: "relative" }}
        >
          {/* 3D laptop canvas — stays in its column. Scroll-driven spin
              turns the model a half-turn as you move toward Services;
              the whole element simply scrolls out of view with the hero,
              which is cleaner than trying to pin it over the page. */}
          <div
            className="hero__3d-wrap"
            style={{
              position: "absolute",
              // expand beyond the column a touch so the screen corner
              // never clips when the model tilts / rotates.
              left: "-12%",
              top: "-18%",
              width: "124%",
              height: "136%",
              opacity: laptopFadeT,
              transform: `translateY(${(1 - laptopFadeT) * 24}px)`,
              transition: "none",
              pointerEvents: "none",
            }}
          >
            <HeroLaptop3D
              showOwlOnScreen={p > 0.62}
              lidClose={lidClose}
              onScreenRect={handleScreenBounds}
              idleEnabled={idleEnabled}
              spinProgress={spinProgress}
            />
          </div>
        </div>
      </div>

      {/* White intro panel — fades out mid-animation */}
      {whiteOpacity > 0.001 && (
        <div
          className="hero-intro-white"
          style={{
            opacity: whiteOpacity,
            pointerEvents: whiteOpacity > 0.5 ? "auto" : "none",
          }}
          aria-hidden
        >
          {/* intro wordmark under the owl — only during the opening beat */}
          <div
            className="hero-intro-wordmark"
            style={{ opacity: introWordmarkOpacity }}
          >
            <span style={{ color: "rgb(242, 120, 47)", fontWeight: 700 }}>WISE</span>
            <span style={{ color: "rgb(242, 120, 47)", fontWeight: 700 }}> AI</span>
          </div>
        </div>
      )}

      {/* Owl PNG — rises centre-screen, then flies to the laptop screen.
          Centred with transform so the box's actual pixel size (which differs
          from width because height is aspect-auto) doesn't shift the midpoint. */}
      {pngOwlOpacity > 0.001 && (
        <img
          className="hero-intro-owl-flight"
          src={owlSrc}
          alt=""
          aria-hidden
          style={{
            position: "fixed",
            left: `${owlCx}px`,
            top:  `${owlCy}px`,
            width: `${owlSize}px`,
            height: `${owlPngHeight}px`,
            opacity: pngOwlOpacity,
            transform: `translate(-50%, -50%) scale(${owlRevealScale})`,
            transformOrigin: "center center",
            pointerEvents: "none",
            zIndex: 30,
            willChange: "transform, left, top, width, opacity",
          }}
        />
      )}
    </section>
  );
}

function useRevealOnView(ref, setRevealed) {
  React.useEffect(() => {
    const el = ref.current;
    if (!el) return;
    let done = false;
    let tid = 0;
    const finish = () => {
      if (done) return;
      done = true;
      setRevealed(true);
      clearTimeout(tid);
      window.removeEventListener("scroll", check);
      window.removeEventListener("resize", check);
    };
    const check = () => {
      if (done) return;
      const r = el.getBoundingClientRect();
      const vh = window.innerHeight || 0;
      if (r.top < vh * 0.92 && r.bottom > vh * 0.05) {
        finish();
      } else {
        tid = setTimeout(check, 140);
      }
    };
    tid = setTimeout(check, 40);
    window.addEventListener("scroll", check, { passive: true });
    window.addEventListener("resize", check);
    return () => {
      done = true;
      clearTimeout(tid);
      window.removeEventListener("scroll", check);
      window.removeEventListener("resize", check);
    };
  }, [ref, setRevealed]);
}

    { rot:  -8, x: -165, y:  -5, floatDur: "6.7s", floatDelay: "-2.1s" },
    { rot:   0, x:    0, y:  10, floatDur: "5.9s", floatDelay: "-1.4s" },
    { rot:   8, x:  165, y:  -5, floatDur: "7.1s", floatDelay: "-3.3s" },
    { rot:  16, x:  310, y: -20, floatDur: "6.3s", floatDelay: "-0.9s" },
  ];

  return (
    <div className="cardstack" onClick={() => setSel(null)}>
      <div
        ref={deckRef}
        className={`cardstack__deck ${sel !== null ? "is-expanded" : ""} ${revealed ? "is-revealed" : ""} ${floating && sel === null ? "is-floating" : ""}`}
      >
        {cards.map((c, i) => {
          const L = layouts[i];
          const others = cards.map((_, j) => j).filter(j => j !== sel);
          const pos = others.indexOf(i);
          const total = others.length;
          let style;
          let state = "resting";
          if (sel === null) {
            style = {
              "--tint": c.tint,
              "--rot": `${L.rot}deg`,
              "--x": `${L.x}px`,
              "--y": `${L.y}px`,
              "--z": i === 2 ? 5 : (i < 2 ? i + 1 : 6 - i),
              "--float-dur": L.floatDur,
              "--float-delay": L.floatDelay,
              transitionDelay: `${i * 0.12}s, ${i * 0.12}s, 0s`,
            };
          } else if (sel === i) {
            style = {
              "--tint": c.tint,
              "--rot": "0deg",
              "--x": "0px",
              "--y": "-40px",
              "--z": 99,
            };
            state = "active";
          } else {
            const spacing = 92;
            const xPos = (pos - (total - 1) / 2) * spacing;
            style = {
              "--tint": c.tint,
              "--rot": `${(pos - (total - 1) / 2) * 3}deg`,
              "--x": `${xPos}px`,
              "--y": "220px",
              "--z": 10 + pos,
            };
            state = "collapsed";
          }
          const revealCls = revealed && state === "resting" ? " is-revealed" : "";
          return (
            <div
              key={i}
              className={`cardstack__card cardstack__card--${state}${revealCls} ${c.dark ? "cardstack__card--dark" : ""}`}
              style={style}
              onClick={(e) => { e.stopPropagation(); setSel(sel === i ? null : i); }}
            >
              <div className="cardstack__label">
                <span className="cardstack__title">{c.title}</span>
                <p className="cardstack__desc">{c.desc}</p>
              </div>
              <div className={`cardstack__texture cardstack__tx--${c.tx}`} aria-hidden="true" />
            </div>
          );
        })}
      </div>
    </div>
  );
}

function BuildDiagram() {
  const nodes = [
    { title: "Agent",     sub: "Autonomous reasoning",  angle: 270 },
    { title: "Tools",     sub: "Stack integrations",    angle: 342 },
    { title: "Workflow",  sub: "Orchestration layer",   angle:  54 },
    { title: "Oversight", sub: "Evals & guardrails",    angle: 126 },
    { title: "Metrics",   sub: "Hours & dollars saved", angle: 198 },
  ];
  const [revealed, setRevealed] = React.useState(false);
  const rootRef = React.useRef(null);

  useRevealOnView(rootRef, setRevealed);

  const R = 36; // radius for nodes (percent)
  const positioned = nodes.map((n) => {
    const a = (n.angle * Math.PI) / 180;
    return { ...n, left: 50 + Math.cos(a) * R, top: 50 + Math.sin(a) * R };
  });

  return (
    <div ref={rootRef} className={`bsystem ${revealed ? "is-revealed" : ""}`}>
      <svg className="bsystem__lines" viewBox="0 0 100 100" preserveAspectRatio="none" aria-hidden="true">
        {positioned.map((n, i) => (
          <line
            key={i}
            x1="50" y1="50"
            x2={n.left} y2={n.top}
            stroke="rgba(26,26,26,0.18)"
            strokeWidth="0.25"
            strokeDasharray="0.8 0.9"
            style={{ transitionDelay: `${i * 90 + 200}ms` }}
            className="bsystem__line"
          />
        ))}
      </svg>
      <div className="bsystem__center">
        <span className="bsystem__center-kicker">System</span>
        <span className="bsystem__center-title">Your AI stack</span>
        <span className="bsystem__center-sub">One source of truth</span>
      </div>
      {positioned.map((n, i) => (
        <div
          key={i}
          className="bsystem__node"
          style={{
            left: `${n.left}%`,
            top: `${n.top}%`,
            transitionDelay: `${i * 100 + 400}ms`,
          }}
        >
          <span className="bsystem__node-title">{n.title}</span>
          <span className="bsystem__node-sub">{n.sub}</span>
        </div>
      ))}
    </div>
  );
}

function Tweaks({ state, setState }) {
  const [visible, setVisible] = React.useState(false);
  const [open, setOpen] = React.useState(true);

  React.useEffect(() => {
    const handler = (e) => {
      if (e.data?.type === "__activate_edit_mode") setVisible(true);
      if (e.data?.type === "__deactivate_edit_mode") setVisible(false);
    };
    window.addEventListener("message", handler);
    window.parent.postMessage({ type: "__edit_mode_available" }, "*");
    return () => window.removeEventListener("message", handler);
  }, []);

  if (!visible) return null;

  const update = (patch) => {
    const next = { ...state, ...patch };
    setState(next);
    window.parent.postMessage({ type: "__edit_mode_set_keys", edits: patch }, "*");
  };

  const accents = [
    { name: "Fire", v: "#FF4D00" },
    { name: "Ocean", v: "#256AFF" },
    { name: "Sand", v: "#C5A474" },
    { name: "Coil", v: "#1A1A1A" },
  ];

  return (
    <div className="tweaks">
      <div className="tweaks__head">
        <span className="tweaks__title">◆ Tweaks</span>
        <button className="tweaks__close" onClick={() => setOpen(!open)}>{open ? "+" : "+"}</button>
      </div>
      {open && (
        <>
          <div className="tweaks__row">
            <span className="tweaks__label">Accent</span>
            <div className="tweaks__swatches">
              {accents.map((a) => (
                <button
                  key={a.v}
                  className={`tweaks__swatch ${state.accent === a.v ? "is-on" : ""}`}
                  style={{ background: a.v }}
                  onClick={() => update({ accent: a.v })}
                  title={a.name}
                />
              ))}
            </div>
          </div>
          <div className="tweaks__row">
            <span className="tweaks__label">Hero variant</span>
            <div className="tweaks__seg">
              {["orange", "snow", "coil"].map((v) => (
                <button
                  key={v}
                  className={state.heroVariant === v ? "is-on" : ""}
                  onClick={() => update({ heroVariant: v })}
                >
                  {v}
                </button>
              ))}
            </div>
          </div>
          <div className="tweaks__row">
            <span className="tweaks__label">Headline italic</span>
            <div className="tweaks__seg">
              {["serif", "stroke"].map((v) => (
                <button
                  key={v}
                  className={state.italic === v ? "is-on" : ""}
                  onClick={() => update({ italic: v })}
                >
                  {v}
                </button>
              ))}
            </div>
          </div>
        </>
      )}
    </div>
  );
}
